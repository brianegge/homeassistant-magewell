name: Release

on:
  push:
    branches:
      - main
    paths:
      - "custom_components/**"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          version=$(jq -r .version custom_components/magewell/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Bump patch version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          new_version="${major}.${minor}.$((patch + 1))"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        run: |
          jq --arg v "${{ steps.bump.outputs.version }}" '.version = $v' \
            custom_components/magewell/manifest.json > tmp.json
          mv tmp.json custom_components/magewell/manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/magewell/manifest.json
          git commit -m "Bump version to ${{ steps.bump.outputs.version }}"
          git push

      - name: Create and push tag
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create release zip
        run: |
          cd custom_components/magewell
          zip -r ../../magewell.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          files: magewell.zip
          generate_release_notes: true
